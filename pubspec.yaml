name: wallora
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core Packages
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10

  # Image Selection & Cloudinary
  image_picker: ^1.1.0
  cloudinary_public: ^0.23.1

  # Network & Path
  http: ^1.2.0
  dio: ^5.4.1
  path_provider: ^2.1.2
  flutter_cache_manager: ^3.3.1

  # Wallpaper & Sharing (STABLE VERSIONS)
  wallpaper_handler: 0.0.1
  gal: ^2.3.0
  share_plus: ^10.1.0

  # UI & Design
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_staggered_grid_view: ^0.7.0
  google_sign_in: ^7.2.0
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
